name: Build APKs

on:
  push:
    branches: [ "main", "master", "testing" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build faceunlock & universalauth-xposed APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── faceunlock APK ──────────────────────────────────────────────────────
      - name: Build faceunlock (debug)
        run: ./gradlew :faceunlock:assembleDebug --no-daemon

      - name: Build faceunlock (release)
        run: ./gradlew :faceunlock:assembleRelease --no-daemon

      # ── universalauth-xposed APK ────────────────────────────────────────────
      - name: Build universalauth-xposed (debug)
        run: ./gradlew :universalauth-xposed:assembleDebug --no-daemon

      - name: Build universalauth-xposed (release)
        run: ./gradlew :universalauth-xposed:assembleRelease --no-daemon

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload faceunlock debug APK
        uses: actions/upload-artifact@v4
        with:
          name: faceunlock-debug
          path: faceunlock/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload faceunlock release APK
        uses: actions/upload-artifact@v4
        with:
          name: faceunlock-release
          path: faceunlock/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload universalauth-xposed debug APK
        uses: actions/upload-artifact@v4
        with:
          name: universalauth-xposed-debug
          path: universalauth-xposed/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload universalauth-xposed release APK
        uses: actions/upload-artifact@v4
        with:
          name: universalauth-xposed-release
          path: universalauth-xposed/build/outputs/apk/release/*.apk
          if-no-files-found: error
